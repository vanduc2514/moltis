name: SDK CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/sdk-ci.yml"
      - "scripts/export-graphql-schema.sh"
      - "scripts/build-libmoltis-sdk.sh"
      - "sdks/**"
      - "crates/graphql/**"
      - "crates/schema-export/**"
      - "apps/ios/GraphQL/Schema/**"
  pull_request:
    paths:
      - ".github/workflows/sdk-ci.yml"
      - "scripts/export-graphql-schema.sh"
      - "scripts/build-libmoltis-sdk.sh"
      - "sdks/**"
      - "crates/graphql/**"
      - "crates/schema-export/**"
      - "apps/ios/GraphQL/Schema/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  schema-sync:
    name: Schema Sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561 # master
        with:
          toolchain: stable

      - name: Verify schema sync
        run: ./scripts/export-graphql-schema.sh --check

  typescript-sdk:
    name: TypeScript SDK
    needs: schema-sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install dependencies
        working-directory: sdks/typescript
        run: npm ci

      - name: Generate GraphQL types
        working-directory: sdks/typescript
        run: npm run generate

      - name: Typecheck
        working-directory: sdks/typescript
        run: npm run typecheck

      - name: Test
        working-directory: sdks/typescript
        run: npm run test

      - name: Package dry run
        working-directory: sdks/typescript
        run: npm run pack:dry

  python-sdk:
    name: Python SDK
    needs: schema-sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync dependencies
        working-directory: sdks/python
        run: uv sync --group dev

      - name: Generate GraphQL types
        working-directory: sdks/python
        run: uv run ariadne-codegen

      - name: Lint
        working-directory: sdks/python
        run: uv run ruff check .

      - name: Typecheck
        working-directory: sdks/python
        run: uv run mypy .

      - name: Test
        working-directory: sdks/python
        run: uv run pytest

      - name: Build package
        working-directory: sdks/python
        run: uv run python -m build

  go-sdk:
    name: Go SDK
    needs: schema-sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Download modules
        working-directory: sdks/go
        run: go mod tidy

      - name: Generate GraphQL code
        working-directory: sdks/go
        run: go generate ./...

      - name: Vet
        working-directory: sdks/go
        run: go vet ./...

      - name: Test
        working-directory: sdks/go
        run: go test ./...

  libmoltis-sdk:
    name: libmoltis SDK
    needs: schema-sync
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561 # master
        with:
          toolchain: stable
          targets: x86_64-apple-darwin,aarch64-apple-darwin,wasm32-wasip2

      - name: Install native build dependencies
        run: brew install cbindgen

      - name: Build SDK artifacts
        run: ./scripts/build-libmoltis-sdk.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: libmoltis-sdk-${{ github.run_id }}-${{ github.run_attempt }}
          path: sdks/libmoltis/dist/
          if-no-files-found: error
